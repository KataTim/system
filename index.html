<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kata Tim System - 文档访问终端</title>
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: #111118;
            --bg-input: #16161f;
            --border: #1e1e2e;
            --border-active: #3a3a55;
            --text: #c8c8d4;
            --text-dim: #7a7a8e;
            --text-bright: #e8e8f0;
            --gold: #b8944b;
            --gold-light: #d4b86a;
            --gold-dark: #8a6530;
            --red: #8b3a3a;
            --red-light: #c44a4a;
            --red-glow: #ff444460;
            --green: #3a7a4a;
            --green-light: #4da85d;
            --accent: #5a6a8a;
            --danger: #c44a4a;
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.6);
            --shadow-gold: 0 0 30px rgba(180, 140, 60, 0.25);
            --radius: 8px;
            --radius-lg: 14px;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', 'Courier New', monospace;
            --font-sans: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            --font-display: 'Georgia', 'Noto Serif SC', 'STSong', 'SimSun', serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-deep);
            color: var(--text);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image:
                radial-gradient(ellipse at 50% 0%, #1a1a2e 0%, transparent 60%),
                radial-gradient(ellipse at 30% 80%, #0f0f1a 0%, transparent 50%),
                radial-gradient(ellipse at 70% 70%, #0d0d18 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* 背景粒子 */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-particle {
            position: absolute;
            border-radius: 50%;
            background: var(--gold);
            opacity: 0;
            animation: floatUp 12s infinite ease-in;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(105vh) translateX(0);
                opacity: 0;
            }
            5% {
                opacity: 0.6;
            }
            30% {
                opacity: 0.15;
            }
            70% {
                opacity: 0.05;
            }
            100% {
                transform: translateY(-10vh) translateX(60px);
                opacity: 0;
            }
        }

        /* 主容器 */
        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
            padding: 20px;
            perspective: 1000px;
        }

        /* 登录卡片 */
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px 32px 32px;
            box-shadow: var(--shadow-lg);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dark), var(--gold), var(--gold-dark), transparent);
            opacity: 0.6;
        }
        .login-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #1a1a30, #2a2a40, #1a1a30, transparent);
            opacity: 0.4;
        }

        /* 系统标题 */
        .system-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .system-logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 14px;
            border: 2px solid var(--gold-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(circle at center, #1a1a25 0%, #0d0d16 100%);
            box-shadow: 0 0 20px rgba(180, 140, 60, 0.2);
        }
        .system-logo .taiji {
            font-size: 28px;
            color: var(--gold);
            line-height: 1;
            user-select: none;
        }
        .system-title {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: var(--text-bright);
            margin-bottom: 2px;
        }
        .system-subtitle {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-family: var(--font-mono);
        }

        /* 表单 */
        .form-group {
            margin-bottom: 18px;
        }
        .form-label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 6px;
            font-family: var(--font-mono);
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-bright);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            letter-spacing: 0.04em;
            transition: all var(--transition);
            outline: none;
        }
        .form-input:focus {
            border-color: var(--border-active);
            box-shadow: 0 0 0 3px rgba(180, 140, 60, 0.08);
            background: #1a1a28;
        }
        .form-input::placeholder {
            color: #44445a;
            letter-spacing: 0.02em;
        }
        .form-input.key-input {
            text-align: center;
            letter-spacing: 0.08em;
            font-size: 1rem;
            text-transform: uppercase;
        }

        /* 密钥协议链接 */
        .protocol-link {
            display: inline-block;
            font-size: 0.7rem;
            color: var(--text-dim);
            cursor: pointer;
            letter-spacing: 0.06em;
            font-family: var(--font-mono);
            text-decoration: none;
            transition: color var(--transition);
            margin-top: 2px;
            user-select: none;
            border-bottom: 1px dashed transparent;
            padding-bottom: 1px;
        }
        .protocol-link:hover {
            color: var(--gold-light);
            border-bottom-color: var(--gold-dark);
        }
        .protocol-link.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        /* 高级密钥区域 */
        .advanced-key-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease, margin 0.35s ease;
            opacity: 0;
            margin-top: 0;
        }
        .advanced-key-section.expanded {
            max-height: 120px;
            opacity: 1;
            margin-top: 14px;
        }
        .advanced-key-inner {
            background: #0d0d18;
            border: 1px solid #1a1a2e;
            border-radius: var(--radius);
            padding: 16px;
            border-left: 2px solid var(--gold-dark);
        }
        .advanced-key-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--gold);
            font-family: var(--font-mono);
            margin-bottom: 8px;
        }

        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 28px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all var(--transition);
            font-weight: 600;
            user-select: none;
            text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #1a1a28, #222238);
            color: var(--text-bright);
            border: 1px solid var(--border-active);
            width: 100%;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #222238, #2a2a42);
            border-color: #555577;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: translateY(0);
            box-shadow: none;
        }
        .btn-danger {
            background: transparent;
            color: var(--red-light);
            border: 1px solid var(--red);
            font-size: 0.7rem;
            padding: 8px 18px;
            letter-spacing: 0.05em;
        }
        .btn-danger:hover {
            background: #1a1010;
            border-color: var(--red-light);
            box-shadow: 0 0 15px var(--red-glow);
        }
        .btn-mail {
            background: transparent;
            color: #7a9ab8;
            border: 1px solid #3a4a5a;
            font-size: 0.68rem;
            padding: 9px 16px;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        .btn-mail:hover {
            background: #101820;
            border-color: #5a7a9a;
            color: #a0c0dd;
            box-shadow: 0 0 12px rgba(90, 120, 160, 0.3);
        }
        .btn-sm {
            padding: 7px 14px;
            font-size: 0.65rem;
            letter-spacing: 0.05em;
        }

        /* 消息提示 */
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 0.75rem;
            letter-spacing: 0.03em;
            margin-top: 14px;
            display: none;
            font-family: var(--font-mono);
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        .alert.show {
            display: block;
        }
        .alert-error {
            background: #1a0f0f;
            border: 1px solid #3a1a1a;
            color: #d4a0a0;
        }
        .alert-success {
            background: #0f1a0f;
            border: 1px solid #1a3a1a;
            color: #a0d4a0;
        }
        .alert-warning {
            background: #1a1a0f;
            border: 1px solid #3a3a1a;
            color: #d4c8a0;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 文档面板 */
        .docs-panel {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            animation: fadeIn 0.4s ease;
        }
        .docs-panel.show {
            display: block;
        }
        .docs-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            background: #0d0d16;
        }
        .docs-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .docs-title {
            font-family: var(--font-display);
            font-size: 1.1rem;
            color: var(--text-bright);
            letter-spacing: 0.04em;
        }
        .user-badge {
            font-size: 0.6rem;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 0.06em;
            font-family: var(--font-mono);
            text-transform: uppercase;
        }
        .user-badge.basic {
            background: #1a1a20;
            border: 1px solid #3a3a50;
            color: #9a9ab0;
        }
        .user-badge.advanced {
            background: #1a1408;
            border: 1px solid #5a4015;
            color: #d4b86a;
            box-shadow: 0 0 8px rgba(180, 140, 60, 0.2);
        }
        .docs-body {
            padding: 8px 0;
            max-height: 55vh;
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        .docs-body::-webkit-scrollbar {
            width: 4px;
        }
        .docs-body::-webkit-scrollbar-track {
            background: transparent;
        }
        .docs-body::-webkit-scrollbar-thumb {
            background: #2a2a3a;
            border-radius: 4px;
        }
        .doc-item {
            padding: 16px 24px;
            border-bottom: 1px solid #15151f;
            cursor: pointer;
            transition: background var(--transition);
            position: relative;
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }
        .doc-item:hover {
            background: #151520;
        }
        .doc-item.locked {
            cursor: not-allowed;
            opacity: 0.7;
        }
        .doc-item.locked:hover {
            background: transparent;
            opacity: 0.75;
        }
        .doc-icon {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            background: #1a1a25;
            border: 1px solid #2a2a3a;
        }
        .doc-icon.locked-icon {
            background: #1a1010;
            border-color: #3a1a1a;
            color: #8b4a4a;
        }
        .doc-info {
            flex: 1;
            min-width: 0;
        }
        .doc-item-title {
            font-weight: 600;
            color: var(--text-bright);
            font-size: 0.85rem;
            letter-spacing: 0.03em;
            margin-bottom: 3px;
            font-family: var(--font-sans);
        }
        .doc-item-meta {
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 0.04em;
            font-family: var(--font-mono);
        }
        .doc-item-summary {
            font-size: 0.7rem;
            color: #6a6a7e;
            margin-top: 4px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .lock-indicator {
            font-size: 0.6rem;
            color: #7a4a4a;
            letter-spacing: 0.05em;
            font-family: var(--font-mono);
            flex-shrink: 0;
            align-self: center;
        }

        /* 文档详情模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            max-width: 680px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: var(--bg-card);
            z-index: 1;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }
        .modal-title {
            font-family: var(--font-display);
            font-size: 1rem;
            color: var(--text-bright);
            letter-spacing: 0.04em;
        }
        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid #3a3a50;
            background: transparent;
            color: #9a9ab0;
            cursor: pointer;
            font-size: 1rem;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .modal-close:hover {
            background: #1a1a28;
            color: #fff;
            border-color: #5a5a70;
        }
        .modal-body {
            padding: 20px 24px;
            line-height: 1.7;
            font-size: 0.85rem;
            color: #c0c0d0;
            white-space: pre-wrap;
            font-family: var(--font-sans);
            letter-spacing: 0.02em;
        }
        .modal-body .classification-stamp {
            display: inline-block;
            padding: 4px 12px;
            border: 1px solid var(--red);
            color: var(--red-light);
            font-family: var(--font-mono);
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 16px;
            border-radius: 3px;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 200;
            padding: 12px 20px;
            border-radius: var(--radius);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.04em;
            animation: slideInRight 0.35s ease, fadeOut 0.4s ease 2.5s forwards;
            pointer-events: none;
            max-width: 400px;
        }
        @keyframes slideInRight {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }
        .toast-error {
            background: #1a0a0a;
            border: 1px solid #4a1a1a;
            color: #e0a0a0;
        }
        .toast-success {
            background: #0a1a0a;
            border: 1px solid #1a4a1a;
            color: #a0e0a0;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .login-card {
                padding: 28px 18px 22px;
                border-radius: 10px;
            }
            .docs-header {
                padding: 14px 16px;
            }
            .doc-item {
                padding: 12px 16px;
                gap: 10px;
            }
            .system-title {
                font-size: 1.3rem;
            }
            .btn {
                padding: 10px 20px;
                font-size: 0.7rem;
            }
            .modal-content {
                max-height: 90vh;
                border-radius: 10px;
            }
            .modal-body {
                padding: 14px 16px;
                font-size: 0.78rem;
            }
        }
    </style>
</head>
<body>

    <!-- 背景粒子 -->
    <div class="bg-particles" id="bgParticles"></div>

    <!-- Toast容器 -->
    <div id="toastContainer"></div>

    <!-- 主应用容器 -->
    <div class="app-container" id="appContainer">

        <!-- ==================== 登录卡片 ==================== -->
        <div class="login-card" id="loginCard">
            <div class="system-header">
                <div class="system-logo">
                    <span class="taiji">☯</span>
                </div>
                <h1 class="system-title">Kata Tim System</h1>
                <p class="system-subtitle">Document Access Terminal v3.7</p>
            </div>

            <!-- 用户名 -->
            <div class="form-group">
                <label class="form-label" for="username">用户标识 / Username</label>
                <input type="text" class="form-input" id="username" placeholder="输入用户名" autocomplete="off" spellcheck="false">
            </div>

            <!-- 普通密钥输入 -->
            <div class="form-group" id="basicKeyGroup">
                <label class="form-label" for="basicKey">访问密钥 / Access Key</label>
                <input type="text" class="form-input key-input" id="basicKey"
                placeholder="XXXX-XXXX-XXXX"
                maxlength="14"
                autocomplete="off"
                spellcheck="false"
                style="text-transform: uppercase;">
                <span class="protocol-link" id="protocolToggle" title="点击进入高级密钥协议">
                    ▶ 密钥协议
                </span>
            </div>

            <!-- 高级密钥区域（默认隐藏） -->
            <div class="advanced-key-section" id="advancedKeySection">
                <div class="advanced-key-inner">
                    <div class="advanced-key-label">🔑 高级协议密钥 / Protocol Key</div>
                    <input type="text" class="form-input key-input" id="advancedKey"
                    placeholder="XXX-XXXX-XXXX-XXXX-XXXX"
                    maxlength="27"
                    autocomplete="off"
                    spellcheck="false"
                    style="text-transform: uppercase; border-color: #3a2a10;">
                    <span class="protocol-link active" id="protocolBack" title="返回普通密钥模式" style="margin-top:6px;">
                        ◀ 返回普通登录
                    </span>
                </div>
            </div>

            <!-- 登录按钮 -->
            <button class="btn btn-primary" id="loginBtn" style="margin-top:6px;">
                ⚡ 验证身份
            </button>

            <!-- 错误/提示消息 -->
            <div class="alert alert-error" id="alertBox"></div>

            <!-- 邮件跳转按钮（无效密钥时显示） -->
            <div id="mailBtnContainer" style="text-align:center; margin-top:10px; display:none;">
                <a class="btn btn-mail" id="mailBtn" href="#" target="_blank">
                    📧 发送邮件至 kata.tim.sys@gmail.com
                </a>
                <p style="font-size:0.6rem;color:#5a5a70;margin-top:6px;letter-spacing:0.04em;font-family:var(--font-mono);">
                    若密钥无效，请通过邮件申请有效密钥
                </p>
            </div>
        </div>

        <!-- ==================== 文档面板（登录后显示） ==================== -->
        <div class="docs-panel" id="docsPanel">
            <div class="docs-header">
                <div class="docs-header-left">
                    <span style="font-size:1.3rem;">☯</span>
                    <span class="docs-title">文档库</span>
                    <span class="user-badge basic" id="userBadge">BASIC</span>
                </div>
                <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                    <span style="font-size:0.65rem;color:var(--text-dim);font-family:var(--font-mono);" id="loggedUserDisplay"></span>
                    <button class="btn btn-danger btn-sm" id="logoutBtn">退出</button>
                </div>
            </div>
            <div class="docs-body" id="docsBody">
                <div style="text-align:center;padding:40px;color:var(--text-dim);">

                // 移除所有非允许字符，转大写
                const cleaned = raw.toUpperCase().replace(/[^ABCDEFGHJKLMNPQRSTUVWXYZ23456789]/g, '');
                // 每4个字符后加连字符，最多3段
                let formatted = '';
                for (let i = 0; i < cleaned.length && i < 12; i++) {
                    if (i > 0 && i % 4 === 0) formatted += '-';
                    formatted += cleaned[i];
                }
                return formatted;
            }

            function formatAdvancedKey(raw) {
                const cleaned = raw.toUpperCase().replace(/[^ABCDEFGHJKLMNPQRSTUVWXYZ23456789]/g, '');
                // 第一段3字符，后面每段4字符，共5段（3+4+4+4+4=19字符）
                let formatted = '';
                let pos = 0;
                const segments = [3, 4, 4, 4, 4];
                for (let seg = 0; seg < segments.length; seg++) {
                    if (seg > 0) formatted += '-';
                    for (let j = 0; j < segments[seg] && pos < cleaned.length; j++) {
                        formatted += cleaned[pos];
                        pos++;
                    }
                }
                return formatted;
            }

            // 基本密钥输入自动格式化
            basicKeyInput.addEventListener('input', function() {
                const cursorPos = this.selectionStart;
                const beforeLen = this.value.length;
                const formatted = formatBasicKey(this.value);
                this.value = formatted;
                // 尝试保持光标位置
                const afterLen = formatted.length;
                const newCursorPos = cursorPos + (afterLen - beforeLen);
                this.setSelectionRange(Math.min(newCursorPos, afterLen), Math.min(newCursorPos,
                    afterLen));
            });

            // 高级密钥输入自动格式化
            advancedKeyInput.addEventListener('input', function() {
                const cursorPos = this.selectionStart;
                const beforeLen = this.value.length;
                const formatted = formatAdvancedKey(this.value);
                this.value = formatted;
                const afterLen = formatted.length;
                const newCursorPos = cursorPos + (afterLen - beforeLen);
                this.setSelectionRange(Math.min(newCursorPos, afterLen), Math.min(newCursorPos,
                    afterLen));
            });

            // ==================== 密钥协议切换 ====================
            protocolToggle.addEventListener('click', function() {
                isAdvancedMode = true;
                advancedKeySection.classList.add('expanded');
                protocolToggle.style.display = 'none';
                basicKeyGroup.style.opacity = '0.5';
                basicKeyInput.style.borderColor = '#1e1e2e';
                advancedKeyInput.focus();
                hideAlert();
                showMailButton(false);
            });

            protocolBack.addEventListener('click', function() {
                isAdvancedMode = false;
                advancedKeySection.classList.remove('expanded');
                protocolToggle.style.display = 'inline-block';
                basicKeyGroup.style.opacity = '1';
                basicKeyInput.style.borderColor = '';
                basicKeyInput.focus();
                advancedKeyInput.value = '';
                hideAlert();
                showMailButton(false);
            });

            // ==================== 登录验证 ====================
            function validateLogin(username, key, isAdvanced) {
                if (!username.trim()) {
                    return { success: false, reason: 'empty_username', message: '请输入用户名。' };
                }
                if (!key.trim()) {
                    return { success: false, reason: 'empty_key',
                        message: '请输入访问密钥。' + (isAdvanced ? '（高级协议密钥格式：XXX-XXXX-XXXX-XXXX-XXXX）' :
                            '（格式：XXXX-XXXX-XXXX）') };
                }

                // 验证密钥格式
                if (isAdvanced) {
                    // 高级密钥格式：3-4-4-4-4（共19字符+4连字符=23字符）
                    const advancedPattern = /^[A-HJ-NP-Z2-9]{3}-[A-HJ-NP-Z2-9]{4}-[A-HJ-NP-Z2-9]{4}-[A-HJ-NP-Z2-9]{4}-[A-HJ-NP-Z2-9]{4}$/;
                    if (!advancedPattern.test(key.toUpperCase())) {
                        return { success: false, reason: 'invalid_format',
                            message: '高级密钥格式无效。正确格式：XXX-XXXX-XXXX-XXXX-XXXX（5段，使用指定字符集）。' };
                    }
                } else {
                    // 普通密钥格式：4-4-4（共12字符+2连字符=14字符）
                    const basicPattern = /^[A-HJ-NP-Z2-9]{4}-[A-HJ-NP-Z2-9]{4}-[A-HJ-NP-Z2-9]{4}$/;
                    if (!basicPattern.test(key.toUpperCase())) {
                        return { success: false, reason: 'invalid_format',
                            message: '密钥格式无效。正确格式：XXXX-XXXX-XXXX（3段，每段4字符，仅使用指定字符集）。请检查输入。' };
                    }
                }

                // 在accounts中查找匹配
                const normalizedKey = key.toUpperCase().trim();
                const normalizedUsername = username.trim();
                const account = accountsData.find(acc =>
                    acc.username === normalizedUsername && acc.key.toUpperCase().trim() === normalizedKey
                );

                if (!account) {
                    return { success: false, reason: 'no_match',
                        message: '用户名与密钥不匹配，或该密钥未在系统中注册。请检查输入或联系管理员获取有效密钥。' };
                }

                // 如果用户使用高级密钥区域但匹配到的是basic账户
                if (isAdvanced && account.level === 'basic') {
                    return { success: false, reason: 'level_mismatch',
                        message: '该密钥为普通权限密钥，请在普通登录界面使用。高级协议密钥需单独申请。' };
                }
                // 如果用户使用普通区域但匹配到的是advanced账户
                if (!isAdvanced && account.level === 'advanced') {
                    return { success: false, reason: 'level_mismatch_advanced',
                        message: '该账户为高级协议账户，请点击下方"密钥协议"使用高级密钥登录。' };
                }

                return { success: true, account: account };
            }

            // ==================== 登录按钮事件 ====================
            loginBtn.addEventListener('click', function() {
                const username = usernameInput.value.trim();
                const key = isAdvancedMode ? advancedKeyInput.value.trim() : basicKeyInput.value.trim();

                hideAlert();
                showMailButton(false);

                const result = validateLogin(username, key, isAdvancedMode);

                if (!result.success) {
                    showAlert(result.message, 'error');
                    if (result.reason === 'no_match' || result.reason === 'invalid_format') {
                        showMailButton(true);
                    }
                    // 震动效果
                    loginCard.style.transform = 'translateX(-4px)';
                    setTimeout(() => { loginCard.style.transform = 'translateX(4px)'; }, 60);
                    setTimeout(() => { loginCard.style.transform = 'translateX(-3px)'; }, 120);
                    setTimeout(() => { loginCard.style.transform = 'translateX(2px)'; }, 180);
                    setTimeout(() => { loginCard.style.transform = ''; }, 240);
                    return;
                }

                // 登录成功
                currentUser = result.account;
                showLoginSuccess(result.account);
            });

            // 回车键登录
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && loginCardVisible) {
                    e.preventDefault();
                    loginBtn.click();
                }
            });

            // ==================== 登录成功 ====================
            function showLoginSuccess(account) {
                hideAlert();
                showMailButton(false);
                showToast('身份验证成功！欢迎，' + (account.name || account.username), 'success');

                // 延迟切换界面
                setTimeout(() => {
                    loginCard.style.display = 'none';
                    loginCardVisible = false;
                    docsPanel.classList.add('show');
                    appContainer.style.maxWidth = '720px';

                    // 更新用户信息
                    loggedUserDisplay.textContent = account.name || account.username;
                    if (account.level === 'advanced') {
                        userBadge.textContent = 'ADVANCED';
                        userBadge.className = 'user-badge advanced';
                    } else {
                        userBadge.textContent = 'BASIC';
                        userBadge.className = 'user-badge basic';
                    }

                    // 渲染文档列表
                    renderDocsList(account.level);
                }, 350);
            }

            // ==================== 退出登录 ====================
            logoutBtn.addEventListener('click', function() {
                currentUser = null;
                docsPanel.classList.remove('show');
                loginCard.style.display = '';
                loginCardVisible = true;
                appContainer.style.maxWidth = '560px';
                usernameInput.value = '';
                basicKeyInput.value = '';
                advancedKeyInput.value = '';
                if (isAdvancedMode) {
                    protocolBack.click(); // 重置为普通模式
                }
                hideAlert();
                showMailButton(false);
                docsBody.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);">' +
                    '<span style="font-size:2rem;display:block;margin-bottom:10px;">⏳</span>正在加载文档列表...</div>';
                showToast('已安全退出系统', 'success');
            });

            // ==================== 渲染文档列表 ====================
            function renderDocsList(userLevel) {
                if (!documentsData.length) {
                    docsBody.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);">' +
                        '<span style="font-size:2rem;display:block;margin-bottom:10px;">📭</span>文档库为空</div>';
                    return;
                }

                let html = '';
                documentsData.forEach((doc, index) => {
                    const isAccessible = userLevel === 'advanced';
                    const lockClass = isAccessible ? '' : ' locked';
                    const iconClass = isAccessible ? '' : ' locked-icon';
                    const iconSymbol = isAccessible ?
                        (doc.category === '事故报告' ? '⚠' : '📄') :
                        '🔒';

                    html += `
                <div class="doc-item${lockClass}" data-doc-index="${index}" data-accessible="${isAccessible}">
                  <div class="doc-icon${iconClass}">${iconSymbol}</div>
                  <div class="doc-info">
                    <div class="doc-item-title">${escapeHTML(doc.title)}</div>
                    <div class="doc-item-meta">${escapeHTML(doc.category)} · ${escapeHTML(doc.date)} · ${escapeHTML(doc.id)}</div>
                    <div class="doc-item-summary">${escapeHTML(doc.summary)}</div>
                  </div>
                  ${!isAccessible ? '<span class="lock-indicator">🔒 需高级权限</span>' : ''}
                </div>`;
                });

                docsBody.innerHTML = html;

                // 绑定点击事件
                docsBody.querySelectorAll('.doc-item').forEach(item => {
                    item.addEventListener('click', function() {
                        const docIndex = parseInt(this.getAttribute('data-doc-index'));
                        const accessible = this.getAttribute('data-accessible') === 'true';

                        if (!accessible) {
                            showToast('您当前的密钥权限不足以查看此文档。请使用高级协议密钥登录。',
                                'error');
                            // 轻微闪烁效果
                            const lockIndicator = this.querySelector('.lock-indicator');
                            if (lockIndicator) {
                                lockIndicator.style.color = '#ff6666';
                                setTimeout(() => { lockIndicator.style.color = '#7a4a4a'; },
                                    400);
                            }
                            return;
                        }

                        // 打开文档详情
                        openDocumentModal(documentsData[docIndex]);
                    });
                });
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ==================== 文档详情模态框 ====================
            function openDocumentModal(doc) {
                modalTitle.textContent = doc.title;
                let bodyHTML = '';
                bodyHTML +=
                    '<span class="classification-stamp">' + escapeHTML(doc.classification || '机密') +
                    '</span>';
                bodyHTML += '<p style="color:#7a7a8e;font-size:0.7rem;font-family:var(--font-mono);margin-bottom:14px;">' +
                    escapeHTML(doc.category) + ' · ' + escapeHTML(doc.date) + ' · ' + escapeHTML(doc.id) +
                    '</p>';
                bodyHTML += '<div style="white-space:pre-wrap;line-height:1.8;">' + escapeHTML(doc.content) +
                    '</div>';
                modalBody.innerHTML = bodyHTML;
                modalOverlay.classList.add('show');
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                modalOverlay.classList.remove('show');
                document.body.style.overflow = '';
                modalBody.innerHTML = '';
            }

            modalClose.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', function(e) {
                if (e.target === modalOverlay) {
                    closeModal();
                }
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modalOverlay.classList.contains('show')) {
                    closeModal();
                }
            });

            // ==================== 初始化 ====================
            async function init() {
                showToast('正在连接 Kata Tim System...', 'success');
                await loadJSONFiles();
                // 清除初始toast（由后续toast覆盖）
                setTimeout(() => {
                    const toasts = toastContainer.querySelectorAll('.toast');
                    if (toasts.length > 1 && toasts[0].textContent.includes('正在连接')) {
                        toasts[0].remove();
                    }
                }, 1500);
                console.log('Kata Tim System 初始化完成。');
                console.log('普通密钥格式示例: XK7B-NQ2R-8FWP (3段，每段4字符)');
                console.log('高级密钥: 003-5KUG-KB2Z-5XNF-3DJS (5段)');
                console.log('字符集: ABCDEFGHJKLMNPQRSTUVWXYZ23456789 (不含I、O、0、1)');
            }

            init();

            // ==================== 暴露到全局用于调试 ====================
            window.KataTimSystem = {
                getAccounts: () => accountsData,
                getDocuments: () => documentsData,
                getCurrentUser: () => currentUser,
                getDataLoaded: () => dataLoaded,
                generateRandomKey: function() {
                    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                    const seg1 = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars
                        .length)]).join('');
                    const seg2 = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars
                        .length)]).join('');
                    const seg3 = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars
                        .length)]).join('');
                    return `${seg1}-${seg2}-${seg3}`;
                },
            };

            console.log('%c Kata Tim System %c已就绪 %c☯',
                'color:#d4b86a;font-size:1.2em;',
                'color:#c8c8d4;',
                'color:#b8944b;font-size:1.4em;');
            console.log('%cwindow.KataTimSystem.generateRandomKey() %c可生成普通密钥',
                'color:#9a9ab0;font-family:monospace;',
                'color:#7a7a8e;');
        })();
    </script>
</body>
</html>
