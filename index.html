<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kata Tim System — 内部系统</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #181825;
            --gold: #b8944b;
            --gold-dim: #7a5f2e;
            --red: #8b1a1a;
            --red-bright: #c0392b;
            --text: #c8c0b8;
            --text-dim: #7a7268;
            --text-bright: #e8e0d8;
            --border: #2a2520;
            --accent: #d4a853;
            --error: #c0392b;
            --success: #4a7a3a;
            --font-mono: 'Courier New', 'Source Code Pro', 'Noto Sans Mono', monospace;
            --font-sans: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            --font-serif: 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', serif;
            --glow-gold: 0 0 20px rgba(184, 148, 75, 0.3);
            --glow-red: 0 0 20px rgba(139, 26, 26, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(184, 148, 75, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 85% 100%, rgba(139, 26, 26, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 15% 80%, rgba(184, 148, 75, 0.03) 0%, transparent 50%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* 粒子背景 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            font-size: 12px;
            color: rgba(184, 148, 75, 0.15);
            animation: floatUp linear infinite;
            user-select: none;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(105vh) rotate(0deg);
                opacity: 0;
            }
            5% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(180deg);
                opacity: 0;
            }
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            padding: 20px;
            transition: all 0.5s ease;
        }
        .main-container.expanded {
            max-width: 900px;
        }

        /* 卡片 */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 36px 32px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), var(--glow-gold);
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), var(--accent), var(--gold-dim), transparent);
            opacity: 0.7;
        }
        .card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(184, 148, 75, 0.3), transparent);
        }

        /* 太极装饰 */
        .taiji-decor {
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
            opacity: 0.6;
            letter-spacing: 6px;
            user-select: none;
            filter: grayscale(30%);
        }

        /* 标题 */
        .system-title {
            text-align: center;
            font-family: var(--font-serif);
            font-size: 22px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 3px;
            margin-bottom: 4px;
            user-select: none;
        }
        .system-subtitle {
            text-align: center;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 4px;
            margin-bottom: 28px;
            user-select: none;
            font-family: var(--font-mono);
        }

        /* 分割线 */
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 20px 0;
            position: relative;
        }
        .divider::after {
            content: '◆';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            padding: 0 10px;
            color: var(--gold-dim);
            font-size: 8px;
        }

        /* 输入组 */
        .input-group {
            margin-bottom: 16px;
            position: relative;
        }
        .input-group label {
            display: block;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-bottom: 6px;
            font-family: var(--font-mono);
            text-transform: uppercase;
        }
        .input-group input {
            width: 100%;
            padding: 12px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-bright);
            font-family: var(--font-mono);
            font-size: 14px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            outline: none;
        }
        .input-group input:focus {
            border-color: var(--gold-dim);
            box-shadow: 0 0 12px rgba(184, 148, 75, 0.15);
        }
        .input-group input::placeholder {
            color: #3a3530;
            letter-spacing: 1px;
            font-size: 12px;
        }

        /* 高级密钥输入区域 */
        .advanced-key-section {
            display: none;
            border: 1px dashed #3a3020;
            border-radius: 6px;
            padding: 18px 16px;
            margin-bottom: 16px;
            background: rgba(139, 26, 26, 0.04);
            animation: fadeSlideIn 0.5s ease;
            position: relative;
        }
        .advanced-key-section.visible {
            display: block;
        }
        .advanced-key-section .badge {
            position: absolute;
            top: -10px;
            left: 16px;
            background: var(--red);
            color: #f0d0d0;
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 3px;
            letter-spacing: 2px;
            font-family: var(--font-mono);
            animation: pulseBadge 2s ease-in-out infinite;
        }
        @keyframes pulseBadge {
            0%,
            100% {
                box-shadow: 0 0 8px rgba(139, 26, 26, 0.5);
            }
            50% {
                box-shadow: 0 0 20px rgba(200, 50, 50, 0.8);
            }
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
                max-height: 0;
            }
            to {
                opacity: 1;
                transform: translateY(0);
                max-height: 200px;
            }
        }
        .advanced-key-section label {
            color: #c08080;
            font-size: 11px;
            letter-spacing: 2px;
            font-family: var(--font-mono);
            display: block;
            margin-bottom: 6px;
        }
        .advanced-key-section input {
            width: 100%;
            padding: 12px 14px;
            background: #1a1015;
            border: 1px solid #3a2025;
            border-radius: 4px;
            color: #e8c0c0;
            font-family: var(--font-mono);
            font-size: 13px;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.3s ease;
        }
        .advanced-key-section input:focus {
            border-color: #8b1a1a;
            box-shadow: 0 0 14px rgba(139, 26, 26, 0.3);
        }
        .advanced-key-section input::placeholder {
            color: #3a2025;
        }

        /* 按钮 */
        .btn {
            display: block;
            width: 100%;
            padding: 13px;
            background: var(--gold-dim);
            border: 1px solid var(--accent);
            border-radius: 4px;
            color: #0a0a0f;
            font-family: var(--font-serif);
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
        }
        .btn:hover {
            background: var(--accent);
            box-shadow: var(--glow-gold);
            transform: translateY(-1px);
        }
        .btn:active {
            transform: scale(0.98);
            transition: transform 0.1s ease;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: var(--font-sans);
            letter-spacing: 1px;
            font-size: 13px;
            font-weight: 400;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            border-color: var(--text-dim);
            color: var(--text-bright);
            box-shadow: none;
        }
        .btn-danger {
            background: var(--red);
            border-color: #a02020;
            color: #f0d0d0;
            letter-spacing: 2px;
            font-family: var(--font-sans);
            font-weight: 500;
        }
        .btn-danger:hover {
            background: #a02020;
            box-shadow: var(--glow-red);
            color: #fff;
        }

        /* "内部"点击区域 */
        .inner-trigger {
            text-align: center;
            margin-top: 12px;
            user-select: none;
            cursor: default;
        }
        .inner-trigger span {
            display: inline-block;
            font-size: 10px;
            color: #1a1815;
            letter-spacing: 2px;
            padding: 4px 12px;
            border-radius: 3px;
            transition: all 0.3s ease;
            cursor: pointer;
            font-family: var(--font-mono);
        }
        .inner-trigger span:hover {
            color: #3a3530;
            background: rgba(255, 255, 255, 0.02);
        }
        .inner-trigger span.flash {
            color: var(--accent);
            text-shadow: 0 0 8px rgba(184, 148, 75, 0.6);
            transition: all 0.05s ease;
        }

        /* 提示消息 */
        .message {
            display: none;
            padding: 12px 16px;
            border-radius: 4px;
            margin-top: 14px;
            font-size: 13px;
            letter-spacing: 1px;
            text-align: center;
            animation: fadeSlideIn 0.3s ease;
        }
        .message.error {
            display: block;
            background: rgba(139, 26, 26, 0.2);
            border: 1px solid #3a1515;
            color: #d08080;
        }
        .message.success {
            display: block;
            background: rgba(74, 122, 58, 0.2);
            border: 1px solid #2a3a20;
            color: #80b870;
        }
        .message.info {
            display: block;
            background: rgba(184, 148, 75, 0.1);
            border: 1px solid #2a2520;
            color: #c8b080;
        }

        /* 邮件按钮 */
        .mail-link {
            display: inline-block;
            color: #c08080;
            text-decoration: underline;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 1px;
            transition: color 0.2s;
        }
        .mail-link:hover {
            color: #e0a0a0;
        }

        /* 文档浏览器 */
        .doc-browser {
            display: none;
            animation: fadeSlideIn 0.5s ease;
        }
        .doc-browser.active {
            display: block;
        }
        .doc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .doc-header .user-info {
            font-size: 12px;
            color: var(--accent);
            letter-spacing: 1px;
            font-family: var(--font-mono);
        }
        .doc-header .user-info .level-badge {
            display: inline-block;
            background: var(--red);
            color: #f0d0d0;
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 2px;
            margin-left: 6px;
            letter-spacing: 2px;
            vertical-align: middle;
        }
        .doc-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 8px;
        }
        .doc-list::-webkit-scrollbar {
            width: 4px;
        }
        .doc-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .doc-list::-webkit-scrollbar-thumb {
            background: #2a2520;
            border-radius: 2px;
        }
        .doc-list-item {
            padding: 14px 16px;
            border: 1px solid transparent;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.25s ease;
            border-radius: 3px;
            position: relative;
        }
        .doc-list-item:hover {
            background: var(--surface2);
            border-color: #2a2520;
        }
        .doc-list-item .doc-title {
            font-family: var(--font-serif);
            font-size: 15px;
            color: var(--text-bright);
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .doc-list-item .doc-meta {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
            font-family: var(--font-mono);
        }
        .doc-list-item .doc-category {
            display: inline-block;
            font-size: 9px;
            padding: 2px 7px;
            border-radius: 2px;
            margin-left: 8px;
            letter-spacing: 1px;
            font-family: var(--font-mono);
            background: rgba(184, 148, 75, 0.15);
            color: #b8944b;
            border: 1px solid rgba(184, 148, 75, 0.25);
        }
        .doc-list-item .doc-category.accident {
            background: rgba(139, 26, 26, 0.2);
            color: #c08080;
            border-color: rgba(139, 26, 26, 0.3);
        }

        /* 文档详情 */
        .doc-detail {
            display: none;
            animation: fadeSlideIn 0.4s ease;
        }
        .doc-detail.active {
            display: block;
        }
        .doc-detail .back-btn {
            display: inline-block;
            cursor: pointer;
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 2px;
            margin-bottom: 18px;
            transition: color 0.2s;
            user-select: none;
        }
        .doc-detail .back-btn:hover {
            color: #d4b873;
        }
        .doc-detail .detail-title {
            font-family: var(--font-serif);
            font-size: 20px;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .doc-detail .detail-meta {
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1px;
            font-family: var(--font-mono);
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .doc-detail .detail-content {
            font-family: var(--font-serif);
            font-size: 14px;
            line-height: 1.9;
            color: var(--text);
            letter-spacing: 0.5px;
            white-space: pre-wrap;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 8px;
        }
        .doc-detail .detail-content::-webkit-scrollbar {
            width: 4px;
        }
        .doc-detail .detail-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .doc-detail .detail-content::-webkit-scrollbar-thumb {
            background: #2a2520;
            border-radius: 2px;
        }

        /* 无权限页面 */
        .no-access {
            display: none;
            text-align: center;
            padding: 30px 0;
            animation: fadeSlideIn 0.5s ease;
        }
        .no-access.active {
            display: block;
        }
        .no-access .lock-icon {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
            user-select: none;
        }
        .no-access h3 {
            font-family: var(--font-serif);
            color: var(--text-dim);
            letter-spacing: 2px;
            font-weight: 400;
        }
        .no-access p {
            font-size: 12px;
            color: #5a5040;
            letter-spacing: 1px;
            margin-top: 8px;
            font-family: var(--font-mono);
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .card {
                padding: 24px 16px;
                border-radius: 4px;
            }
            .system-title {
                font-size: 18px;
                letter-spacing: 2px;
            }
            .system-subtitle {
                font-size: 10px;
                letter-spacing: 3px;
            }
            .input-group input {
                font-size: 13px;
                padding: 10px 12px;
            }
            .btn {
                font-size: 13px;
                padding: 11px;
                letter-spacing: 2px;
            }
            .doc-detail .detail-title {
                font-size: 17px;
            }
            .doc-detail .detail-content {
                font-size: 13px;
                max-height: 350px;
            }
            .doc-list {
                max-height: 300px;
            }
        }
    </style>
</head>
<body>

    <!-- 粒子背景 -->
    <div class="particles" id="particles"></div>

    <!-- 主容器 -->
    <div class="main-container" id="mainContainer">
        <div class="card" id="mainCard">

            <!-- 太极装饰 -->
            <div class="taiji-decor">☯</div>

            <!-- 标题 -->
            <div class="system-title">Kata Tim System</div>
            <div class="system-subtitle">· 内 部 系 统 ·</div>

            <!-- ==================== 登录表单 ==================== -->
            <div id="loginSection">
                <div class="input-group">
                    <label>用户名 / Username</label>
                    <input type="text" id="usernameInput" placeholder="输入用户名" autocomplete="off">
                </div>

                <div class="input-group">
                    <label>内部密钥 / Key（XXXX-XXXX-XXXX）</label>
                    <input type="text" id="keyInput" placeholder="XXXX-XXXX-XXXX" autocomplete="off" maxlength="14">
                </div>

                <!-- 高级密钥区域（默认隐藏） -->
                <div class="advanced-key-section" id="advancedKeySection">
                    <span class="badge">▲ 高级</span>
                    <label>高级密钥 / Advanced Key（5段）</label>
                    <input type="text" id="advancedKeyInput" placeholder="XXX-XXXX-XXXX-XXXX-XXXX" autocomplete="off" maxlength="27">
                </div>

                <button class="btn" id="loginBtn">验 证 登 录</button>

                <!-- 消息区域 -->
                <div id="messageArea"></div>

                <!-- "内部" 点击触发器 -->
                <div class="inner-trigger">
                    <span id="innerTrigger" title="">内 部</span>
                </div>
            </div>

            <!-- ==================== 文档浏览器（高级用户） ==================== -->
            <div class="doc-browser" id="docBrowser">
                <div class="doc-header">
                    <span class="user-info">
                        已登录：<strong id="displayUsername">—</strong>
                        <span class="level-badge">高级权限</span>
                    </span>
                    <button class="btn btn-secondary" id="logoutBtn" style="width:auto;padding:8px 16px;font-size:11px;margin-top:0;">退出登录</button>
                </div>
                <div id="docListView">
                    <p style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim);letter-spacing:2px;margin-bottom:14px;">
                        📁 档案目录 — 共 <span id="docCount">0</span> 份文档
                    </p>
                    <ul class="doc-list" id="docList"></ul>
                </div>
                <div class="doc-detail" id="docDetail"></div>
            </div>

            <!-- ==================== 无权限页面（普通用户） ==================== -->
            <div class="no-access" id="noAccessSection">
                <div class="lock-icon">🔒</div>
                <h3>访问受限</h3>
                <p>您的密钥权限等级不足<br>无法查阅内部文档</p>
                <p style="margin-top:16px;font-size:10px;color:#4a4030;">如需升级权限，请联系系统管理员</p>
                <button class="btn btn-secondary" id="logoutBtn2" style="width:auto;padding:8px 20px;font-size:11px;margin-top:20px;">返回登录</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 粒子背景 ====================
            const particlesContainer = document.getElementById('particles');
            const taoistSymbols = ['☯', '☰', '☱', '☲', '☳', '☴', '☵', '☶', '☷', '·', '○', '◇', '△', '□'];
            for (let i = 0; i < 35; i++) {
                const particle = document.createElement('span');
                particle.className = 'particle';
                particle.textContent = taoistSymbols[Math.floor(Math.random() * taoistSymbols.length)];
                particle.style.left = Math.random() * 95 + '%';
                particle.style.fontSize = (8 + Math.random() * 16) + 'px';
                particle.style.animationDuration = (15 + Math.random() * 40) + 's';
                particle.style.animationDelay = Math.random() * 35 + 's';
                particle.style.opacity = (0.06 + Math.random() * 0.14);
                particlesContainer.appendChild(particle);
            }

            // ==================== DOM 元素 ====================
            const loginSection = document.getElementById('loginSection');
            const docBrowser = document.getElementById('docBrowser');
            const noAccessSection = document.getElementById('noAccessSection');
            const advancedKeySection = document.getElementById('advancedKeySection');
            const messageArea = document.getElementById('messageArea');
            const innerTrigger = document.getElementById('innerTrigger');
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const logoutBtn2 = document.getElementById('logoutBtn2');
            const usernameInput = document.getElementById('usernameInput');
            const keyInput = document.getElementById('keyInput');
            const advancedKeyInput = document.getElementById('advancedKeyInput');
            const mainContainer = document.getElementById('mainContainer');
            const docListView = document.getElementById('docListView');
            const docDetail = document.getElementById('docDetail');
            const docList = document.getElementById('docList');
            const docCountSpan = document.getElementById('docCount');
            const displayUsername = document.getElementById('displayUsername');

            // ==================== 状态 ====================
            let innerClickCount = 0;
            let innerClickTimer = null;
            let accountsData = [];
            let documentsData = [];
            let currentUser = null;
            let isAdvancedUser = false;

            // ==================== 加载JSON数据 ====================
            async function loadJSON(path) {
                try {
                    const response = await fetch(path);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return await response.json();
                } catch (err) {
                    console.error(`加载 ${path} 失败:`, err);
                    return null;
                }
            }

            async function initData() {
                const accountsResult = await loadJSON('accounts.json');
                const documentsResult = await loadJSON('documents.json');

                if (accountsResult && accountsResult.accounts) {
                    accountsData = accountsResult.accounts;
                } else {
                    console.warn('accounts.json 加载失败，使用默认数据');

            // ==================== 内部触发器逻辑 ====================
            innerTrigger.addEventListener('click', function(e) {
                e.stopPropagation();
                innerClickCount++;

                // 视觉闪烁
                innerTrigger.classList.add('flash');
                setTimeout(() => innerTrigger.classList.remove('flash'), 80);

                // 清除之前的计时器
                if (innerClickTimer) clearTimeout(innerClickTimer);

                // 1.5秒内没有新点击则重置计数
                innerClickTimer = setTimeout(() => {
                    innerClickCount = 0;
                }, 1500);

                // 连续点击5次触发
                if (innerClickCount >= 5) {
                    innerClickCount = 0;
                    if (innerClickTimer) clearTimeout(innerClickTimer);
                    triggerAdvancedKeySection();
                }
            });

            function triggerAdvancedKeySection() {
                if (advancedKeySection.classList.contains('visible')) return;
                advancedKeySection.classList.add('visible');
                // 滚动到高级密钥区域
                advancedKeySection.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // 聚焦高级密钥输入框
                setTimeout(() => advancedKeyInput.focus(), 400);
            }

            // ==================== 登录逻辑 ====================
            loginBtn.addEventListener('click', handleLogin);
            // 回车键登录
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const activeEl = document.activeElement;
                    if (activeEl === usernameInput || activeEl === keyInput || activeEl === advancedKeyInput) {
                        handleLogin();
                    }
                }
            });

            function handleLogin() {
                const username = usernameInput.value.trim();
                const basicKey = keyInput.value.trim();
                const advancedKey = advancedKeyInput.value.trim();
                const hasAdvancedInput = advancedKeySection.classList.contains('visible') && advancedKey.length > 0;

                // 清除旧消息
                clearMessage();

                // 验证输入
                if (!username) {
                    showMessage('请输入用户名', 'error');
                    usernameInput.focus();
                    return;
                }

                let keyToUse = null;
                let isAdvancedAttempt = false;

                if (hasAdvancedInput) {
                    // 用户使用了高级密钥输入框
                    if (!advancedKey) {
                        showMessage('请输入高级密钥', 'error');
                        advancedKeyInput.focus();
                        return;
                    }
                    keyToUse = advancedKey;
                    isAdvancedAttempt = true;
                } else {
                    if (!basicKey) {
                        showMessage('请输入内部密钥', 'error');
                        keyInput.focus();
                        return;
                    }
                    keyToUse = basicKey;
                    isAdvancedAttempt = false;
                }

                // 在accountsData中查找匹配
                const matchedAccount = accountsData.find(acc =>
                    acc.username.toLowerCase() === username.toLowerCase() && acc.key === keyToUse
                );

                if (!matchedAccount) {
                    // 密钥无效
                    showInvalidKeyMessage();
                    return;
                }

                // 登录成功
                currentUser = matchedAccount;
                if (matchedAccount.level === 'advanced') {
                    isAdvancedUser = true;
                    showAdvancedInterface(matchedAccount);
                } else {
                    isAdvancedUser = false;
                    showBasicInterface(matchedAccount);
                }
            }

                const body = encodeURIComponent(
                    '我的密钥无法通过Kata Tim System的验证。\n\n使用的用户名：' + (usernameInput.value.trim() || '（未填写）') +

                messageArea.innerHTML = `

                messageArea.style.display = 'block';

                        ${doc.classified ? ' <span style="color:#8b1a1a;">[机密文档]</span>' : ''}
                    </div>
                    <div class="detail-content">${escapeHTML(doc.content)}</div>

                    docDetail.classList.remove('active');
                    docListView.style.display = 'block';
                });
                // 滚动文档详情到顶部
                docDetail.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ==================== 初始化 ====================
            async function init() {
                await initData();
                usernameInput.focus();
                // 如果URL中有hash参数，自动填充（用于测试）
                const hash = window.location.hash;
                if (hash) {
                    const params = new URLSearchParams(hash.replace('#', ''));
                    if (params.get('user')) usernameInput.value = params.get('user');
                    if (params.get('key')) keyInput.value = params.get('key');
                }
            }

            init().catch(err => {
                console.error('初始化失败:', err);
                // 即使加载失败也允许使用默认数据
            });

            // ==================== 防止意外刷新丢失状态 ====================
            window.addEventListener('beforeunload', function(e) {
                if (currentUser && isAdvancedUser) {
                    // 不强制阻止，但给予提示
                    // 在现代浏览器中，自定义消息可能不显示，但对话框仍会出现
                }
            });

            console.log('%cKata Tim System %c— 内部系统已就绪',
                'color:#b8944b;font-size:16px;letter-spacing:3px;',
                'color:#7a7268;');
            console.log('%c☯ 连续点击登录界面的"内部"5次以解锁高级密钥入口',
                'color:#5a5040;font-size:11px;');
        })();
