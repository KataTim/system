<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kata Tim System - 内部研究档案</title>
    <style>
        :root {
            --bg-deep: #0a0a0c;
            --bg-panel: #111318;
            --bg-input: #1a1d25;
            --text-primary: #c9ccd4;
            --text-secondary: #8b8f9a;
            --accent-gold: #c9a96e;
            --accent-red: #b8404a;
            --accent-dim: #5a4030;
            --glow-gold: #e8c878;
            --glow-red: #d45050;
            --border-subtle: #2a2d36;
            --border-active: #4a3d2e;
            --terminal-green: #3dc06c;
            --font-mono: 'Courier New', 'Source Code Pro', 'Consolas', monospace;
            --font-sans: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --font-serif: 'Noto Serif SC', 'SimSun', 'STSong', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            overflow-x: hidden;
            cursor: default;
            -webkit-font-smoothing: antialiased;
        }

        /* 粒子背景 */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.55;
        }

        /* 扫描线覆盖 */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.03) 2px,
                    rgba(0, 0, 0, 0.03) 4px);
            opacity: 0.4;
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 卡片面板 */
        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 40px 36px;
            width: 100%;
            max-width: 480px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 0 80px rgba(180, 130, 60, 0.06);
            position: relative;
            transition: all 0.4s ease;
        }

        .panel.expanded {
            max-width: 820px;
        }

        /* 顶部八卦装饰 */
        .bagua-decor {
            text-align: center;
            margin-bottom: 24px;
            font-size: 28px;
            letter-spacing: 8px;
            opacity: 0.5;
            color: var(--accent-gold);
            user-select: none;
            animation: subtlePulse 3s ease-in-out infinite;
        }

        @keyframes subtlePulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 0.7;
            }
        }

        /* 标题 */
        .system-title {
            text-align: center;
            margin-bottom: 6px;
            font-family: var(--font-serif);
            font-size: 1.8em;
            letter-spacing: 3px;
            color: var(--accent-gold);
            font-weight: 400;
            user-select: none;
            text-shadow: 0 0 40px rgba(200, 160, 80, 0.3);
        }

        .system-subtitle {
            text-align: center;
            font-size: 0.75em;
            letter-spacing: 4px;
            color: var(--text-secondary);
            margin-bottom: 28px;
            user-select: none;
            font-family: var(--font-mono);
        }

        /* 分隔线 */
        .divider {
            border: none;
            border-top: 1px solid var(--border-subtle);
            margin: 20px 0;
            position: relative;
        }
        .divider::after {
            content: '◆';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-panel);
            padding: 0 12px;
            color: var(--accent-dim);
            font-size: 10px;
        }

        /* 输入组 */
        .input-group {
            margin-bottom: 18px;
        }
        .input-group label {
            display: block;
            font-size: 0.78em;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 7px;
            font-family: var(--font-mono);
            text-transform: uppercase;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.95em;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            outline: none;
        }
        .input-group input:focus {
            border-color: var(--border-active);
            box-shadow: 0 0 20px rgba(180, 130, 60, 0.15), 0 0 0 1px rgba(180, 130, 60, 0.2);
            background: #1f222d;
        }
        .input-group input::placeholder {
            color: #4a4d58;
            letter-spacing: 1px;
        }

        /* 按钮 */
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 4px;
            font-family: var(--font-mono);
            letter-spacing: 2px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            border: 1px solid transparent;
            user-select: none;
            text-decoration: none;
        }
        .btn-primary {
            background: transparent;
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            width: 100%;
        }
        .btn-primary:hover {
            background: rgba(200, 160, 80, 0.1);
            box-shadow: 0 0 30px rgba(200, 160, 80, 0.25);
            border-color: var(--glow-gold);
            color: var(--glow-gold);
        }
        .btn-protocol {
            background: transparent;
            border: 1px dashed var(--accent-red);
            color: var(--accent-red);
            width: 100%;
            margin-top: 10px;
            letter-spacing: 1px;
            font-size: 0.8em;
            padding: 10px 20px;
        }
        .btn-protocol:hover {
            background: rgba(180, 60, 60, 0.1);
            box-shadow: 0 0 25px rgba(200, 70, 70, 0.2);
            border-color: var(--glow-red);
            color: #e86060;
        }
        .btn-small {
            padding: 8px 18px;
            font-size: 0.75em;
            letter-spacing: 1px;
            border-radius: 3px;
        }
        .btn-danger {
            background: transparent;
            border-color: #6b3030;
            color: #c87070;
        }
        .btn-danger:hover {
            background: rgba(160, 50, 50, 0.15);
            border-color: #a04040;
            box-shadow: 0 0 20px rgba(180, 50, 50, 0.2);
        }
        .btn-back {
            background: transparent;
            border-color: var(--border-subtle);
            color: var(--text-secondary);
        }
        .btn-back:hover {
            border-color: #555;
            color: #ccc;
            background: rgba(255, 255, 255, 0.03);
        }

        /* 消息提示 */
        .message {
            padding: 12px 16px;
            border-radius: 4px;
            margin-top: 14px;
            font-size: 0.8em;
            letter-spacing: 1px;
            display: none;
            font-family: var(--font-mono);
        }
        .message.error {
            display: block;
            background: rgba(180, 40, 40, 0.15);
            border: 1px solid rgba(200, 60, 60, 0.4);
            color: #e88080;
        }
        .message.success {
            display: block;
            background: rgba(40, 140, 60, 0.12);
            border: 1px solid rgba(60, 180, 80, 0.35);
            color: #70c880;
        }
        .message.info {
            display: block;
            background: rgba(140, 120, 40, 0.1);
            border: 1px solid rgba(180, 150, 60, 0.3);
            color: #c9a96e;
        }

        /* 邮件链接 */
        .mail-link {
            color: #c97070;
            text-decoration: none;
            border-bottom: 1px dotted #c97070;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .mail-link:hover {
            color: #f09090;
            border-bottom-color: #f09090;
            text-shadow: 0 0 10px rgba(200, 80, 80, 0.5);
        }

        /* 模态框覆盖 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.hidden {
            display: none;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal-panel {
            background: #15171f;
            border: 1px solid #3a2020;
            border-radius: 8px;
            padding: 36px 30px;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9), 0 0 60px rgba(180, 40, 40, 0.15);
            position: relative;
            animation: slideUp 0.35s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal-panel .modal-title {
            text-align: center;
            font-family: var(--font-serif);
            color: #d4a0a0;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        .modal-panel .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: #777;
            font-size: 1.5em;
            cursor: pointer;
            transition: color 0.3s;
            font-family: var(--font-sans);
        }
        .modal-panel .close-btn:hover {
            color: #ccc;
        }

        /* 文档列表 */
        .doc-list-container {
            display: none;
            margin-top: 20px;
        }
        .doc-list-container.visible {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        .doc-list-header {
            font-family: var(--font-serif);
            color: var(--accent-gold);
            letter-spacing: 2px;
            margin-bottom: 16px;
            font-size: 1.1em;
            text-align: center;
        }
        .doc-card {
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: 5px;
            padding: 16px 18px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .doc-card:hover {
            border-color: var(--border-active);
            box-shadow: 0 0 20px rgba(180, 130, 60, 0.1);
            background: #1f2230;
            transform: translateX(3px);
        }
        .doc-card .doc-title {
            font-family: var(--font-serif);
            font-size: 0.95em;
            color: #d4c4a8;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .doc-card .doc-meta {
            font-size: 0.7em;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            letter-spacing: 1px;
        }
        .doc-card .doc-classification {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.65em;
            letter-spacing: 2px;
            font-family: var(--font-mono);
            padding: 4px 10px;
            border-radius: 2px;
        }
        .classification-top-secret {
            background: rgba(180, 40, 40, 0.2);
            color: #d47070;
            border: 1px solid rgba(180, 40, 40, 0.4);
        }
        .classification-confidential {
            background: rgba(180, 130, 30, 0.15);
            color: #c9a040;
            border: 1px solid rgba(180, 130, 30, 0.35);
        }
        .classification-internal {
            background: rgba(100, 140, 100, 0.12);
            color: #80a880;
            border: 1px solid rgba(100, 140, 100, 0.3);
        }

        /* 文档详情 */
        .doc-detail-view {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .doc-detail-view.visible {
            display: block;
        }
        .doc-detail-content {
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: 5px;
            padding: 24px 22px;
            margin-top: 16px;
            font-family: var(--font-serif);
            line-height: 1.9;
            letter-spacing: 0.5px;
            color: #bfc3cc;
            max-height: 55vh;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 0.9em;
        }
        .doc-detail-content::-webkit-scrollbar {
            width: 5px;
        }
        .doc-detail-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .doc-detail-content::-webkit-scrollbar-thumb {
            background: #2a2d36;
            border-radius: 3px;
        }

        /* 无权限页面 */
        .no-access-view {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        .no-access-view.visible {
            display: block;
        }
        .no-access-icon {
            font-size: 4em;
            margin-bottom: 16px;
            opacity: 0.6;
            user-select: none;
        }

        /* 用户信息条 */
        .user-info-bar {
            display: none;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 0.75em;
            letter-spacing: 1px;
            font-family: var(--font-mono);
        }
        .user-info-bar.visible {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .user-info-bar .level-badge {
            padding: 3px 10px;
            border-radius: 2px;
            font-size: 0.85em;
            letter-spacing: 2px;
        }
        .badge-basic {
            background: rgba(140, 140, 140, 0.15);
            color: #999;
            border: 1px solid #444;
        }
        .badge-advanced {
            background: rgba(200, 160, 60, 0.18);
            color: #d4b860;
            border: 1px solid #6b5530;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .panel {
                padding: 28px 18px;
                border-radius: 4px;
            }
            .system-title {
                font-size: 1.3em;
                letter-spacing: 2px;
            }
            .system-subtitle {
                font-size: 0.65em;
                letter-spacing: 2px;
            }
            .bagua-decor {
                font-size: 20px;
                letter-spacing: 5px;
            }
            .doc-card .doc-classification {
                position: static;
                transform: none;
                display: inline-block;
                margin-top: 6px;
            }
            .modal-panel {
                padding: 24px 16px;
            }
        }
    </style>
</head>
<body>

    <!-- 粒子背景 -->
    <canvas id="particles-canvas"></canvas>
    <!-- 扫描线 -->
    <div class="scanlines"></div>

    <!-- 主容器 -->
    <div class="main-container" id="mainContainer">
        <div class="panel" id="mainPanel">
            <!-- 八卦装饰 -->
            <div class="bagua-decor">☰ ☷ ☵ ☲ ☳ ☴ ☶ ☱</div>

            <!-- 系统标题 -->
            <div class="system-title">Kata Tim System</div>
            <div class="system-subtitle">· 内部研究档案 · 灵魂数字化项目 ·</div>

            <!-- 登录表单 -->
            <div id="loginForm">
                <div class="input-group">
                    <label for="username">用户名 / Username</label>
                    <input type="text" id="username" placeholder="输入用户名..." autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="accessKey">内部密钥 / Access Key</label>
                    <input type="text" id="accessKey" placeholder="XXXX-XXXX-XXXX" autocomplete="off">
                </div>
                <button class="btn btn-primary" id="btnLogin" onclick="handleLogin()">
                    验证身份 · 进入系统
                </button>
                <button class="btn btn-protocol" id="btnProtocol" onclick="openProtocolModal()">
                    🔐 密钥协议 · 高级授权
                </button>
                <div id="loginMessage" class="message"></div>
            </div>

            <!-- 用户信息条 -->
            <div class="user-info-bar" id="userInfoBar">
                <span id="userDisplayName"></span>
                <span class="level-badge" id="userLevelBadge"></span>
                <button class="btn btn-small btn-back" onclick="handleLogout()">退出登录</button>
            </div>

            <!-- 无权限视图 -->
            <div class="no-access-view" id="noAccessView">
                <div class="no-access-icon">🔒</div>
                <p style="font-family:var(--font-serif);color:#b0a090;letter-spacing:1px;margin-bottom:8px;">
                    您的密钥权限级别不足
                </p>
                <p style="font-size:0.75em;color:var(--text-secondary);letter-spacing:1px;margin-bottom:16px;">
                    当前密钥为<strong>普通级别</strong>，无法访问文档档案库。<br>
                    如需获取高级授权，请使用
                    <span style="color:var(--accent-gold);">密钥协议</span> 通道。
                </p>
                <button class="btn btn-protocol btn-small" onclick="openProtocolModal()">
                    🔐 前往密钥协议
                </button>
            </div>

            <!-- 文档列表视图 -->
            <div class="doc-list-container" id="docListView">
                <div class="doc-list-header">📁 档案目录 · 机密文档</div>
                <div id="docListInner"></div>
            </div>

            <!-- 文档详情视图 -->
            <div class="doc-detail-view" id="docDetailView">
                <button class="btn btn-small btn-back" onclick="backToDocList()" style="margin-bottom:12px;">
                    ← 返回档案目录
                </button>
                <div class="doc-detail-content" id="docDetailContent"></div>
            </div>
        </div>
    </div>

    <!-- 高级密钥协议模态框 -->
    <div class="modal-overlay hidden" id="protocolModal">
        <div class="modal-panel">
            <button class="close-btn" onclick="closeProtocolModal()">✕</button>
            <div class="modal-title">🔐 密钥协议 · 高级授权验证</div>
            <p style="text-align:center;font-size:0.7em;color:var(--text-secondary);letter-spacing:1px;margin-bottom:18px;font-family:var(--font-mono);">
                仅限授权研究人员 · 五段式密钥
            </p>
            <div class="input-group">
                <label for="advUsername">用户名</label>
                <input type="text" id="advUsername" placeholder="输入用户名..." autocomplete="off">
            </div>
            <div class="input-group">
                <label for="advKey">高级密钥</label>
                <input type="text" id="advKey" placeholder="XXX-XXXX-XXXX-XXXX-XXXX" autocomplete="off">
            </div>
            <button class="btn btn-primary" onclick="handleAdvancedLogin()" style="border-color:#b8404a;color:#d4a0a0;">
                验证高级密钥
            </button>
            <div id="advMessage" class="message"></div>
            <div style="text-align:center;margin-top:12px;font-size:0.7em;">
                <span style="color:var(--text-secondary);">密钥无效？</span>
                <a class="mail-link" href="mailto:kata.tim.sys@gmail.com?subject=高级密钥验证失败 - 请求协助&body=请描述您遇到的问题：%0A%0A用户名：%0A使用的密钥：%0A%0A---%0A此邮件来自 Kata Tim System 登录页面"
                    target="_blank">
                    联系系统管理员 ↗
                </a>
            </div>
        </div>
    </div>

    <script>
        // ==================== 全局状态 ====================
        let currentUser = null; // null | { username, level, name }
        let allDocuments = [];
        let allAccounts = [];
        let currentDocId = null;

        // ==================== 粒子背景 ====================
        (function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const maxParticles = 55;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 1.8 + 0.4;
                    this.speedX = (Math.random() - 0.5) * 0.35;
                    this.speedY = (Math.random() - 0.5) * 0.35;
                    this.opacity = Math.random() * 0.5 + 0.15;
                    this.fadeSpeed = Math.random() * 0.004 + 0.002;
                    this.fadingOut = Math.random() > 0.5;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.fadingOut) {
                        this.opacity -= this.fadeSpeed;
                        if (this.opacity <= 0.05) this.fadingOut = false;
                    } else {
                        this.opacity += this.fadeSpeed;
                        if (this.opacity >= 0.6) this.fadingOut = true;
                    }
                    if (this.x < -10 || this.x > canvas.width + 10 ||
                        this.y < -10 || this.y > canvas.height + 10) {
                        this.reset();
                    }
                }
                draw() {
                    ctx.fillStyle = `rgba(190,150,100,${this.opacity})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (let i = 0; i < maxParticles; i++) {
                particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animate);
            }
            animate();
        })();

        // ==================== 数据加载 ====================
        async function loadJSONFiles() {
            try {
                const [accountsRes, documentsRes] = await Promise.all([
                    fetch('./accounts.json'),
                    fetch('./documents.json')
                ]);
                if (!accountsRes.ok || !documentsRes.ok) {
                    throw new Error('JSON文件加载失败');
                }
                const accountsData = await accountsRes.json();
                const documentsData = await documentsRes.json();
                allAccounts = accountsData.users || [];
                allDocuments = documentsData.documents || [];
                console.log(`[KTS] 已加载 ${allAccounts.length} 个账号, ${allDocuments.length} 份文档`);
            } catch (err) {
                console.error('[KTS] 数据加载错误:', err);
                showLoginMessage('系统数据加载失败，请刷新页面重试。', 'error');
            }
        }

        // ==================== 工具函数 ====================
        function showLoginMessage(msg, type) {
    const el = document.getElementById('loginMessage');
    el.innerHTML = msg;  // 改为 innerHTML
    el.className = 'message ' + type;
}

function showAdvMessage(msg, type) {
    const el = document.getElementById('advMessage');
    el.innerHTML = msg;  // 改为 innerHTML
    el.className = 'message ' + type;
}

        function clearLoginMessage() {
            const el = document.getElementById('loginMessage');
            el.className = 'message';
            el.textContent = '';
        }

        function clearAdvMessage() {
            const el = document.getElementById('advMessage');
            el.className = 'message';
            el.textContent = '';
        }

        // 普通密钥格式验证 (三段式: XXXX-XXXX-XXXX)
        function isValidBasicKeyFormat(key) {
            return /^[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/.test(key);
        }

        // 高级密钥格式验证 (五段式: XXX-XXXX-XXXX-XXXX-XXXX)
        function isValidAdvancedKeyFormat(key) {
            return /^[A-Z0-9]{3,4}-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/.test(key);
        }

        // 在账号列表中查找匹配
        function findAccount(username, key) {
            return allAccounts.find(
                acc => acc.username.toLowerCase() === username.toLowerCase() && acc.key === key
            );
        }

        // ==================== 登录逻辑 ====================
        function handleLogin() {
            clearLoginMessage();
            const username = document.getElementById('username').value.trim();
            const key = document.getElementById('accessKey').value.trim();

            if (!username || !key) {
                showLoginMessage('请填写用户名和密钥。', 'error');
                return;
            }

            // 检查是否是高级密钥格式（五段式）在普通登录中使用
            if (isValidAdvancedKeyFormat(key) && !isValidBasicKeyFormat(key)) {
                showLoginMessage('检测到高级密钥格式。请点击下方「密钥协议」按钮使用高级授权通道。', 'info');
                return;
            }

            const account = findAccount(username, key);

            if (!account) {
                // 密钥无效
                const mailtoLink =
                    `mailto:kata.tim.sys@gmail.com?subject=密钥验证失败 - 请求协助&body=您好，%0A%0A我在尝试登录 Kata Tim System 时遇到密钥验证失败。%0A%0A用户名：${encodeURIComponent(username)}%0A使用的密钥：${encodeURIComponent(key)}%0A%0A请协助解决。%0A%0A---%0A此邮件来自 Kata Tim System 登录页面`;
                showLoginMessage(
                    `密钥无效或用户名不匹配。如需协助，请 ` +
                    `<a class="mail-link" href="${mailtoLink}" target="_blank">发送邮件给系统管理员 ↗</a>`,
                    'error'
                );
                return;
            }

            // 登录成功
            currentUser = {
                username: account.username,
                level: account.level,
                name: account.name || account.username
            };
            updateUIForLoggedInUser();
            showLoginMessage('', '');
            clearLoginMessage();
        }

        function handleAdvancedLogin() {
            clearAdvMessage();
            const username = document.getElementById('advUsername').value.trim();
            const key = document.getElementById('advKey').value.trim();

            if (!username || !key) {
                showAdvMessage('请填写用户名和高级密钥。', 'error');
                return;
            }

            if (!isValidAdvancedKeyFormat(key)) {
                showAdvMessage('密钥格式不正确。高级密钥为五段式：XXX-XXXX-XXXX-XXXX-XXXX', 'error');
                return;
            }

            const account = findAccount(username, key);

            if (!account) {
                const mailtoLink =
                    `mailto:kata.tim.sys@gmail.com?subject=高级密钥验证失败 - 请求协助&body=您好，%0A%0A我在 Kata Tim System 的高级密钥协议验证中失败。%0A%0A用户名：${encodeURIComponent(username)}%0A高级密钥：${encodeURIComponent(key)}%0A%0A请协助解决。%0A%0A---%0A此邮件来自 Kata Tim System 密钥协议页面`;
                showAdvMessage(
                    `高级密钥验证失败。如需协助，请 ` +
                    `<a class="mail-link" href="${mailtoLink}" target="_blank">发送邮件给系统管理员 ↗</a>`,
                    'error'
                );
                return;
            }

            if (account.level !== 'advanced') {
                showAdvMessage('该密钥为普通级别，无法通过高级授权。请使用普通登录入口。', 'error');
                return;
            }

            // 高级登录成功
            currentUser = {
                username: account.username,
                level: account.level,
                name: account.name || account.username
            };
            closeProtocolModal();
            updateUIForLoggedInUser();
            clearLoginMessage();
        }

        // ==================== UI更新 ====================
        function updateUIForLoggedInUser() {
            const loginForm = document.getElementById('loginForm');
            const userInfoBar = document.getElementById('userInfoBar');
            const noAccessView = document.getElementById('noAccessView');
            const docListView = document.getElementById('docListView');
            const docDetailView = document.getElementById('docDetailView');
            const mainPanel = document.getElementById('mainPanel');

            // 隐藏登录表单
            loginForm.style.display = 'none';

            // 显示用户信息条
            userInfoBar.classList.add('visible');
            document.getElementById('userDisplayName').textContent =
                `👤 ${currentUser.name} (${currentUser.username})`;
            const badge = document.getElementById('userLevelBadge');
            if (currentUser.level === 'advanced') {
                badge.textContent = '高级授权';
                badge.className = 'level-badge badge-advanced';
            } else {
                badge.textContent = '普通授权';
                badge.className = 'level-badge badge-basic';
            }

            // 根据级别显示不同内容
            if (currentUser.level === 'advanced') {
                noAccessView.classList.remove('visible');
                docDetailView.classList.remove('visible');
                docListView.classList.add('visible');
                mainPanel.classList.add('expanded');
                renderDocList();
            } else {
                docListView.classList.remove('visible');
                docDetailView.classList.remove('visible');
                noAccessView.classList.add('visible');
                mainPanel.classList.remove('expanded');
            }

            // 存储到sessionStorage
            sessionStorage.setItem('kts_user', JSON.stringify(currentUser));
        }

        function handleLogout() {
            currentUser = null;
            sessionStorage.removeItem('kts_user');
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('userInfoBar').classList.remove('visible');
            document.getElementById('noAccessView').classList.remove('visible');
            document.getElementById('docListView').classList.remove('visible');
            document.getElementById('docDetailView').classList.remove('visible');
            document.getElementById('mainPanel').classList.remove('expanded');
            document.getElementById('username').value = '';
            document.getElementById('accessKey').value = '';
            document.getElementById('advUsername').value = '';
            document.getElementById('advKey').value = '';
            clearLoginMessage();
            clearAdvMessage();
            document.getElementById('docListInner').innerHTML = '';
            document.getElementById('docDetailContent').innerHTML = '';
            currentDocId = null;
        }

        // ==================== 文档渲染 ====================
        function renderDocList() {
            const container = document.getElementById('docListInner');
            if (!allDocuments.length) {
                container.innerHTML =
                    '<p style="text-align:center;color:var(--text-secondary);padding:30px;">暂无档案数据。</p>';
                return;
            }
            let html = '';
            allDocuments.forEach(doc => {
                let classificationClass = 'classification-internal';
                let classificationLabel = '内部';
                if (doc.classification === 'top-secret') {
                    classificationClass = 'classification-top-secret';
                    classificationLabel = '绝密';
                } else if (doc.classification === 'confidential') {
                    classificationClass = 'classification-confidential';
                    classificationLabel = '机密';
                }
                html += `
                <div class="doc-card" onclick="openDocument('${doc.id}')">
                    <span class="doc-title">${escapeHTML(doc.title)}</span>
                    <span class="doc-meta">${escapeHTML(doc.date)} · ${escapeHTML(doc.author)} · ${escapeHTML(doc.category)}</span>
                    <span class="doc-classification ${classificationClass}">${classificationLabel}</span>
                </div>`;
            });
            container.innerHTML = html;
        }

        function openDocument(docId) {
            const doc = allDocuments.find(d => d.id === docId);
            if (!doc) return;
            currentDocId = docId;
            document.getElementById('docListView').classList.remove('visible');
            const detailView = document.getElementById('docDetailView');
            detailView.classList.add('visible');
            const content = document.getElementById('docDetailContent');
            let classificationLabel = '内部';
            if (doc.classification === 'top-secret') classificationLabel = '【绝密】';
            else if (doc.classification === 'confidential') classificationLabel = '【机密】';
            content.innerHTML = `
                <h3 style="color:var(--accent-gold);letter-spacing:2px;margin-bottom:4px;font-family:var(--font-serif);">${escapeHTML(doc.title)}</h3>
                <p style="font-size:0.7em;color:var(--text-secondary);margin-bottom:16px;font-family:var(--font-mono);letter-spacing:1px;">
                    ${classificationLabel} · ${escapeHTML(doc.date)} · ${escapeHTML(doc.author)} · 分类：${escapeHTML(doc.category)}
                </p>
                <hr style="border-color:var(--border-subtle);margin-bottom:16px;">
                <div style="white-space:pre-wrap;line-height:1.9;">${escapeHTML(doc.content)}</div>
            `;
        }

        function backToDocList() {
            document.getElementById('docDetailView').classList.remove('visible');
            document.getElementById('docListView').classList.add('visible');
            currentDocId = null;
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ==================== 模态框 ====================
        function openProtocolModal() {
            document.getElementById('protocolModal').classList.remove('hidden');
            document.getElementById('advUsername').value = '';
            document.getElementById('advKey').value = '';
            clearAdvMessage();
            // 如果已登录普通账号，预填用户名
            if (currentUser && currentUser.level === 'basic') {
                document.getElementById('advUsername').value = currentUser.username;
            }
            setTimeout(() => {
                document.getElementById('advUsername').focus();
            }, 200);
        }

        function closeProtocolModal() {
            document.getElementById('protocolModal').classList.add('hidden');
            clearAdvMessage();
        }

        // 点击模态框外部关闭
        document.getElementById('protocolModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeProtocolModal();
            }
        });

        // 键盘事件
        document.addEventListener('keydown', function(e) {
            // ESC关闭模态框
            if (e.key === 'Escape') {
                const modal = document.getElementById('protocolModal');
                if (!modal.classList.contains('hidden')) {
                    closeProtocolModal();
                }
            }
            // Enter键提交
            if (e.key === 'Enter') {
                const modal = document.getElementById('protocolModal');
                if (!modal.classList.contains('hidden')) {
                    handleAdvancedLogin();
                } else if (document.getElementById('loginForm').style.display !== 'none') {
                    handleLogin();
                }
            }
        });

        // ==================== 初始化 ====================
        async function init() {
            await loadJSONFiles();

            // 检查sessionStorage中是否有已登录用户
            const savedUser = sessionStorage.getItem('kts_user');
            if (savedUser) {
                try {
                    const parsed = JSON.parse(savedUser);
                    // 在账号列表中验证该用户是否仍然有效
                    const account = findAccount(parsed.username,
                        ''); // 无法获取完整密钥，用宽松验证
                    const fullAccount = allAccounts.find(
                        acc => acc.username.toLowerCase() === parsed.username.toLowerCase() &&
                            acc.level === parsed.level
                    );
                    if (fullAccount) {
                        currentUser = {
                            username: fullAccount.username,
                            level: fullAccount.level,
                            name: fullAccount.name || fullAccount.username
                        };
                        updateUIForLoggedInUser();
                        return;
                    }
                } catch (e) {
                    sessionStorage.removeItem('kts_user');
                }
            }

            // 默认显示登录界面
            document.getElementById('loginForm').style.display = 'block';
        }

        // 启动
        init();

        console.log(`

        ║   Kata Tim System - 内部研究档案    ║

        > console.log('高级账号: admin_sys / 003-5KUG-KB2Z-5XNF-3DJS');
        `);
    </script>
