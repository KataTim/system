<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appeal Submitted · Vouch Required</title>
    <style>
        :root {
            --bg-deep: #080814;
            --card-bg: rgba(15, 18, 32, 0.78);
            --accent: #2c7be5;
            --accent-glow: #4d94ff;
            --gold: #e6b422;
            --gold-soft: #f0c75e;
            --text-primary: #e8ecf1;
            --text-muted: #8892b0;
            --border-subtle: rgba(255, 255, 255, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-deep);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            cursor: default;
            user-select: none;
        }

        /* ---------- 动态背景层 ---------- */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(130px);
            opacity: 0.38;
            animation: orbDrift 20s ease-in-out infinite;
        }
        .bg-orb--1 {
            width: 750px;
            height: 750px;
            background: radial-gradient(circle, rgba(44, 123, 229, 0.45) 0%, transparent 70%);
            top: -25%;
            left: -10%;
            animation-delay: 0s;
        }
        .bg-orb--2 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(230, 180, 34, 0.35) 0%, transparent 70%);
            bottom: -30%;
            right: -12%;
            animation-delay: -8s;
            animation-duration: 22s;
        }
        .bg-orb--3 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(90, 140, 240, 0.3) 0%, transparent 70%);
            top: 50%;
            left: 45%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
            animation-duration: 24s;
        }

        @keyframes orbDrift {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            20% {
                transform: translate(6%, -4%) scale(1.06);
            }
            40% {
                transform: translate(-5%, 6%) scale(0.93);
            }
            60% {
                transform: translate(-6%, -5%) scale(1.04);
            }
            80% {
                transform: translate(4%, 5%) scale(0.97);
            }
        }

        .grid-texture {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.035;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.4) 1px, transparent 1px);
            background-size: 70px 70px;
            mask-image: radial-gradient(ellipse at center, black 25%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 25%, transparent 70%);
        }

        .noise-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.025;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 180px 180px;
        }

        /* ---------- 粒子画布 ---------- */
        canvas#particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* ---------- 主卡片 ---------- */
        .card-wrapper {
            position: relative;
            z-index: 10;
            perspective: 800px;
        }

        .card {
            position: relative;
            width: 580px;
            max-width: 93vw;
            padding: 56px 48px 50px;
            background: var(--card-bg);
            backdrop-filter: blur(30px) saturate(140%);
            -webkit-backdrop-filter: blur(30px) saturate(140%);
            border: 1px solid var(--border-subtle);
            border-radius: 32px;
            text-align: center;
            box-shadow:
                0 10px 45px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.04) inset,
                0 70px 90px -35px rgba(0, 0, 0, 0.7);
            animation: cardEntry 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }

        @keyframes cardEntry {
            0% {
                opacity: 0;
                transform: translateY(45px) scale(0.93);
                filter: blur(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(44, 123, 229, 0.3) 20%,
                    rgba(230, 180, 34, 0.45) 50%,
                    rgba(44, 123, 229, 0.3) 80%,
                    transparent);
            border-radius: 1px;
        }

        .card::after {
            content: '';
            position: absolute;
            top: -1px;
            right: -1px;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 75% 25%, rgba(44, 123, 229, 0.25) 0%, transparent 70%);
            border-radius: 0 32px 0 0;
            pointer-events: none;
            z-index: -1;
        }

        /* ---------- 图标区 ---------- */
        .icon-container {
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
            animation: iconFloat 4s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%,
            100% {
                transform: translateY(0);
                filter: drop-shadow(0 0 20px rgba(44, 123, 229, 0.5));
            }
            50% {
                transform: translateY(-6px);
                filter: drop-shadow(0 0 35px rgba(230, 180, 34, 0.65));
            }
        }

        .hex-frame {
            position: absolute;
            inset: -22px;
            border: 2px solid rgba(44, 123, 229, 0.25);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            animation: hexRotate 25s linear infinite;
            pointer-events: none;
        }

        @keyframes hexRotate {
            to {
                transform: rotate(360deg);
            }
        }

        .appeal-icon {
            width: 80px;
            height: 80px;
            display: inline-block;
        }
        .appeal-icon svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 8px 24px rgba(44, 123, 229, 0.4));
        }
        .envelope-outline {
            fill: none;
            stroke: #8ab4f8;
            stroke-width: 3;
            stroke-linejoin: round;
            stroke-dasharray: 260;
            stroke-dashoffset: 260;
            animation: envelopeDraw 1s ease-out 0.25s forwards;
        }
        .envelope-flap {
            fill: none;
            stroke: #e6b422;
            stroke-width: 2.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 90;
            stroke-dashoffset: 90;
            animation: flapDraw 0.7s ease-out 0.7s forwards;
        }
        .check-mark {
            fill: none;
            stroke: #e6b422;
            stroke-width: 4.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 70;
            stroke-dashoffset: 70;
            animation: checkDraw 0.5s ease-out 1.1s forwards;
        }
        .key-glow {
            fill: none;
            stroke: #e6b422;
            stroke-width: 2;
            opacity: 0;
            animation: keyAppear 0.6s ease-out 1.4s forwards;
        }

        @keyframes envelopeDraw {
            to {
                stroke-dashoffset: 0;
            }
        }
        @keyframes flapDraw {
            to {
                stroke-dashoffset: 0;
            }
        }
        @keyframes checkDraw {
            to {
                stroke-dashoffset: 0;
            }
        }
        @keyframes keyAppear {
            0% {
                opacity: 0;
                transform: translate(0, 5px);
            }
            100% {
                opacity: 0.9;
                transform: translate(0, 0);
            }
        }

        /* ---------- 文字区 ---------- */
        .title {
            font-size: 1.65rem;
            font-weight: 650;
            letter-spacing: 0.03em;
            color: #f0f2f5;
            margin-bottom: 10px;
            animation: textFadeIn 0.7s ease-out 0.4s both;
        }
        .title .highlight {
            color: #4d94ff;
            text-shadow: 0 0 24px rgba(77, 148, 255, 0.4);
        }

        .subtitle {
            font-size: 0.98rem;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.03em;
            margin-bottom: 30px;
            line-height: 1.6;
            animation: textFadeIn 0.7s ease-out 0.55s both;
        }
        .subtitle .premium-key {
            font-weight: 700;
            color: #e6b422;
            background: rgba(230, 180, 34, 0.08);
            padding: 2px 8px;
            border-radius: 5px;
            letter-spacing: 0.04em;
            white-space: nowrap;
            border: 1px solid rgba(230, 180, 34, 0.25);
        }

        @keyframes textFadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .divider {
            width: 65px;
            height: 2px;
            margin: 0 auto 26px;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(44, 123, 229, 0.65) 30%,
                    rgba(230, 180, 34, 0.8) 50%,
                    rgba(44, 123, 229, 0.65) 70%,
                    transparent);
            border-radius: 2px;
            animation: textFadeIn 0.7s ease-out 0.65s both;
        }

        .description {
            font-size: 0.85rem;
            color: #8892b0;
            line-height: 1.7;
            letter-spacing: 0.02em;
            animation: textFadeIn 0.7s ease-out 0.75s both;
        }

        .status-tag {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            margin-top: 26px;
            font-size: 0.8rem;
            color: #b0b8d0;
            letter-spacing: 0.04em;
            animation: textFadeIn 0.7s ease-out 0.85s both;
        }
        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #e6b422;
            box-shadow: 0 0 12px #e6b422, 0 0 28px rgba(230, 180, 34, 0.55);
            animation: dotPulse 1.5s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(1.25);
            }
        }

        /* ---------- 响应式 ---------- */
        @media (max-width: 600px) {
            .card {
                padding: 40px 24px 38px;
                border-radius: 24px;
            }
            .card::after {
                border-radius: 0 24px 0 0;
                width: 60px;
                height: 60px;
            }
            .title {
                font-size: 1.35rem;
            }
            .subtitle {
                font-size: 0.9rem;
            }
            .appeal-icon {
                width: 64px;
                height: 64px;
            }
            .hex-frame {
                inset: -16px;
            }
        }
    </style>
</head>
<body>
    <!-- 动态光晕背景 -->
    <div class="bg-layer">
        <div class="bg-orb bg-orb--1"></div>
        <div class="bg-orb bg-orb--2"></div>
        <div class="bg-orb bg-orb--3"></div>
    </div>
    <div class="grid-texture"></div>
    <div class="noise-overlay"></div>

    <!-- 粒子画布 -->
    <canvas id="particles"></canvas>

    <!-- 主卡片 -->
    <div class="card-wrapper">
        <div class="card">
            <!-- 图标：信封 + 对勾 + 钥匙元素 -->
            <div class="icon-container">
                <div class="hex-frame"></div>
                <div class="appeal-icon">
                    <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                        <!-- 信封主体 -->
                        <rect class="envelope-outline" x="12" y="24" width="56" height="36" rx="4" />
                        <!-- 信封翻盖 -->
                        <polyline class="envelope-flap" points="12,24 40,48 68,24" />
                        <!-- 对勾 -->
                        <polyline class="check-mark" points="28,44 37,53 52,34" />
                        <!-- 小型钥匙图案（装饰） -->
                        <g class="key-glow" transform="translate(58,54) scale(0.45)">
                            <circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" stroke-width="2.5"/>
                            <line x1="8" y1="15" x2="8" y2="24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                            <line x1="6" y1="20" x2="10" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <line x1="6" y1="23" x2="9" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </g>
                    </svg>
                </div>
            </div>

            <!-- 标题 -->
            <h1 class="title">
                Appeal <span class="highlight">Submitted</span>
            </h1>

            <!-- 副标题 / 核心文案 -->
            <p class="subtitle">
                Please invite a user with a<br>
                <span class="premium-key">🔑 premium key</span> to vouch for you.
            </p>

            <!-- 分割线 -->
            <div class="divider"></div>

            <!-- 辅助说明 -->
            <p class="description">
                Your case is now pending verification.<br>
                A trusted member with an active premium key must confirm your identity.
            </p>
            <p class="description" style="margin-top:6px; font-size:0.8rem; color:#6b7394;">
                Reference: <span style="font-family: monospace; color:#8ab4f8;">VCH-2026-07-17</span>
            </p>

            <!-- 状态标识 -->
            <div class="status-tag">
                <span class="status-dot"></span> Awaiting premium vouch
            </div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            const PARTICLE_COUNT = 75;

            class Particle {
                constructor() {
                    this.reset(true);
                }
                reset(initial = false) {
                    this.x = Math.random() * width;
                    this.y = initial ? Math.random() * height : height + 20;
                    this.size = Math.random() * 2.0 + 0.4;
                    this.speedY = -(Math.random() * 0.38 + 0.1);
                    this.speedX = (Math.random() - 0.5) * 0.35;
                    this.opacity = Math.random() * 0.5 + 0.15;
                    this.opacityFlicker = Math.random() * 0.018;
                    // 颜色偏蓝 (200-240) 和金色 (40-55)
                    this.hue = Math.random() < 0.45 ?
                        Math.random() * 40 + 200 // 蓝紫色范围
                        :
                        Math.random() * 15 + 40; // 金色范围
                    this.saturation = Math.random() * 35 + 30;
                    this.lightness = Math.random() * 35 + 50;
                }
                update() {
                    this.y += this.speedY;
                    this.x += this.speedX;
                    this.opacity += (Math.random() - 0.5) * this.opacityFlicker;
                    this.opacity = Math.max(0.06, Math.min(0.7, this.opacity));
                    if (this.y < -20 || this.x < -20 || this.x > width + 20) {
                        this.reset();
                    }
                }
                draw(ctx) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, ${this.opacity})`;
                    ctx.fill();
                    if (this.size > 1.1 && this.opacity > 0.3) {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size * 2.8, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, ${this.opacity * 0.1})`;
                        ctx.fill();
                    }
                }
            }

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                particles.forEach(p => p.reset(true));
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push(new Particle());
                }
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => {
                    p.update();
                    p.draw(ctx);
                });
                // 近距离连线
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 90) {
                            const alpha = (1 - dist / 90) * 0.07;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(138,180,248,${alpha})`;
                            ctx.lineWidth = 0.6;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', resize);
            resize();
            initParticles();
            animate();

            // 鼠标轻微排斥效果
            let mouseX = -200;
            let mouseY = -200;
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });
            document.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) {
                    mouseX = e.touches[0].clientX;
                    mouseY = e.touches[0].clientY;
                }
            }, { passive: true });

            const originalUpdate = Particle.prototype.update;
            Particle.prototype.update = function() {
                originalUpdate.call(this);
                const dx = this.x - mouseX;
                const dy = this.y - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 110) {
                    const force = (1 - dist / 110) * 0.55;
                    this.x += (dx / dist) * force;
                    this.y += (dy / dist) * force;
                }
            };
        })();
    </script>
</body>
</html>
