<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>访问拒绝</title>
    <style>
        /* ===== 全局重置 & 基础 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, -apple-system, sans-serif;
            background: #0b0e1a;
            /* 备用背景色 */
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* ===== 精美动态背景 ===== */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(72, 49, 212, 0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(212, 49, 120, 0.20) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(49, 180, 212, 0.15) 0%, transparent 50%),
                linear-gradient(145deg, #0b0e1a 0%, #141b2d 45%, #1a0f24 100%);
            background-attachment: fixed;
        }

        /* 浮动光晕粒子 */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: floatOrb 18s ease-in-out infinite alternate;
        }

        .glow-orb--1 {
            width: 50vmax;
            height: 50vmax;
            top: -15%;
            left: -10%;
            background: radial-gradient(circle, rgba(120, 80, 255, 0.30), rgba(120, 80, 255, 0) 70%);
            animation-duration: 22s;
        }

        .glow-orb--2 {
            width: 40vmax;
            height: 40vmax;
            bottom: -10%;
            right: -8%;
            background: radial-gradient(circle, rgba(255, 70, 150, 0.25), rgba(255, 70, 150, 0) 70%);
            animation-duration: 26s;
            animation-delay: -6s;
        }

        .glow-orb--3 {
            width: 30vmax;
            height: 30vmax;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(50, 200, 255, 0.18), rgba(50, 200, 255, 0) 70%);
            animation-duration: 20s;
            animation-delay: -10s;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(3%, -4%) scale(1.08);
            }
            66% {
                transform: translate(-2%, 5%) scale(0.92);
            }
            100% {
                transform: translate(4%, -2%) scale(1.05);
            }
        }

        /* 微妙的网格线条 (增强科技感) */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        /* ===== 主卡片 ===== */
        .card {
            position: relative;
            z-index: 1;
            max-width: 600px;
            width: 100%;
            padding: 3rem 2.5rem;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow:
                0 40px 80px rgba(0, 0, 0, 0.60),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 0 60px rgba(120, 80, 255, 0.08);
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;
            animation: cardAppear 1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .card:hover {
            transform: translateY(-4px) scale(1.005);
            box-shadow:
                0 50px 100px rgba(0, 0, 0, 0.70),
                0 0 0 1px rgba(255, 255, 255, 0.06) inset,
                0 0 80px rgba(120, 80, 255, 0.12);
        }

        @keyframes cardAppear {
            0% {
                opacity: 0;
                transform: scale(0.92) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* ===== 图标 / 符号 ===== */
        .icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 70, 100, 0.25), rgba(200, 40, 80, 0.10));
            border: 1px solid rgba(255, 70, 100, 0.25);
            box-shadow: 0 0 50px rgba(255, 50, 80, 0.15);
            margin-bottom: 1.8rem;
        }

        .icon-wrapper svg {
            width: 44px;
            height: 44px;
            fill: none;
            stroke: #ff6b7c;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 12px rgba(255, 80, 100, 0.30));
        }

        /* ===== 文字 ===== */
        .status-badge {
            display: inline-block;
            padding: 0.35rem 1.2rem;
            border-radius: 100px;
            background: rgba(255, 70, 100, 0.12);
            border: 1px solid rgba(255, 70, 100, 0.20);
            color: rgba(255, 150, 170, 0.9);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 1.2rem;
            backdrop-filter: blur(4px);
        }

        .main-heading {
            font-size: clamp(2.2rem, 8vw, 3.6rem);
            font-weight: 700;
            line-height: 1.15;
            letter-spacing: -0.02em;
            color: #fff;
            margin-bottom: 0.6rem;
            text-shadow: 0 2px 30px rgba(0, 0, 0, 0.40);
        }

        .main-heading .highlight {
            background: linear-gradient(135deg, #ff6b7c, #ff3b6f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 30px rgba(255, 50, 80, 0.25));
        }

        .sub-message {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            color: rgba(255, 255, 255, 0.60);
            line-height: 1.7;
            max-width: 420px;
            margin: 0.8rem auto 2rem;
            font-weight: 300;
            letter-spacing: 0.01em;
        }

        .sub-message strong {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
        }

        /* ===== 分割装饰线 ===== */
        .divider {
            width: 60px;
            height: 2px;
            margin: 1.2rem auto 1.8rem;
            background: linear-gradient(90deg, transparent, rgba(255, 100, 130, 0.40), transparent);
            border-radius: 4px;
        }

        /* ===== 底部状态 ===== */
        .footer-note {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.04em;
            margin-top: 1.5rem;
            padding-top: 1.2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .footer-note .dot {
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255, 70, 100, 0.35);
            animation: pulseDot 2.4s ease-in-out infinite;
        }

        @keyframes pulseDot {
            0%,
            100% {
                opacity: 0.3;
                transform: scale(0.8);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* ===== 响应式调整 ===== */
        @media (max-width: 480px) {
            .card {
                padding: 2.2rem 1.5rem;
                border-radius: 32px;
            }

            .icon-wrapper {
                width: 72px;
                height: 72px;
            }

            .icon-wrapper svg {
                width: 36px;
                height: 36px;
            }

            .status-badge {
                font-size: 0.65rem;
                padding: 0.25rem 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 背景层 ===== -->
    <div class="bg-canvas"></div>
    <div class="glow-orb glow-orb--1"></div>
    <div class="glow-orb glow-orb--2"></div>
    <div class="glow-orb glow-orb--3"></div>
    <div class="grid-overlay"></div>

    <!-- ===== 主卡片 ===== -->
    <div class="card" role="alert" aria-live="assertive">

        <!-- 图标：禁止 / 锁 -->
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" />
                <line x1="4.93" y1="4.93" x2="19.07" y2="19.07" />
                <circle cx="12" cy="16" r="0.6" fill="#ff6b7c" stroke="none" />
                <line x1="12" y1="12" x2="12" y2="14.5" />
            </svg>
        </div>

        <!-- 状态标签 -->
        <div class="status-badge">⛔ 拒绝访问</div>

        <!-- 主标题 -->
        <h1 class="main-heading">
            Access <span class="highlight">Denied</span>
        </h1>

        <!-- 副标题 / 核心信息 -->
        <p class="sub-message">
            <strong>Liscat</strong> 已被列入黑名单。<br />
            您的访问权限已被系统自动撤销。
        </p>

        <!-- 装饰分割 -->
        <div class="divider"></div>

        <!-- 底部状态 -->
        <div class="footer-note">
            <span class="dot"></span>
            <span>安全策略 · 拒绝访问</span>
            <span class="dot"></span>
        </div>

    </div>

</body>
</html>
